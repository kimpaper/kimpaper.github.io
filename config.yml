baseURL: "https://kimpaper.github.io"
title: 기록 저장소
languageCode: "ko-KR"
defaultContentLanguage: "ko"
paginate: 10
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

minify:
    disableXML: true
    # minifyOutput: true

languages:
    ko:
        weight: 1
        languageCode: "ko-KR"
        title: 기록 저장소
    en:
        weight: 2
        languageCode: "en-US"
        title: "paper.archive"
        params:
            description: "A Korean developer's archive — backend/infra notes and everyday Korean food (K-food) records from Seoul: what we eat, where, and how."
            keywords: ["korean food", "k-food", "seoul restaurants", "dev blog", "backend", "korea travel"]

outputs:
    home:
        - HTML
        - RSS
        - JSON

params:
    env: production
    description: "개발하며 배운 것들과 소소한 일상을 기록하는 기술·일상 블로그. Spring, Golang, Kubernetes 등 백엔드/인프라와 맛집·여행 기록을 담습니다."
    keywords: ["기술블로그", "개발블로그", "Spring", "Golang", "Kubernetes", "백엔드", "일상", "맛집"]
    author: 페이퍼
    # author: ["Me", "You"] # multiple authors

    # ─── 검색엔진 소유확인 (SEO) ───────────────────────────
    # Google Search Console(search.google.com/search-console)에서 발급받은 확인 코드.
    # 'HTML 태그' 방식의 content 값만 붙여넣으세요. (예: abcd1234...)
    googleSiteVerification: ""
    # 네이버 서치어드바이저(searchadvisor.naver.com) '사이트 소유확인' meta content 값.
    naverSiteVerification: "535791f117859cd623dbefcc827eb5a6db94e081"
    # ──────────────────────────────────────────────────

    # ─── 방문자 통계 / 광고 ───────────────────────────────
    # Google Analytics 4 측정 ID (GA4 콘솔 > 관리 > 데이터 스트림에서 발급, G-로 시작)
    # 아래 XXXX 를 실제 ID 로 바꾸면 방문자 통계 수집이 시작됩니다.
    googleAnalyticsID: "G-ECTTT48V9Y"
    # Google AdSense 게시자 ID (AdSense 콘솔 > 계정 > 계정 정보, ca-pub-로 시작)
    # 값을 채우면 자동 광고 + {{< adsense >}} shortcode 가 활성화됩니다.
    adsenseClient: "ca-pub-8048816011496920"
    # ──────────────────────────────────────────────────

    defaultTheme: auto
    # disableThemeToggle: true
    ShowShareButtons: true
    ShowReadingTime: true
    # disableSpecial1stPost: true
    displayFullLangName: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    ShowToc: true
    # comments: false
    images: ["images/2026-07-17-daebit-1.jpg"]

    profileMode:
        enabled: false
        title: kimpaper blog
        imageUrl: "#"
        imageTitle: my image
        # imageWidth: 120
        # imageHeight: 120
        buttons:
            - name: Archives
              url: archives
            - name: Tags
              url: tags

    homeInfoParams:
        Title: "기록 저장소"
        Content: >
            개인 블로그입니다.
            내용에 잘못된 부분은 정정 요청하시면 반영하겠습니다.

    socialIcons:
        - name: github
          url: "https://github.com/kimpaper"
        - name: RsS
          url: "index.xml"

    editPost:
        URL: "https://github.com/kimpaper/kimpaper.github.io/tree/main/content"
        Text: "Edit" # edit text
        appendFilePath: true # to append file path to Edit link

    # label:
    #     text: "Home"
    #     icon: icon.png
    #     iconHeight: 35

    # analytics:
    #     google:
    #         SiteVerificationTag: "XYZabc"

    # assets:
    #     favicon: "<link / abs url>"
    #     favicon16x16: "<link / abs url>"
    #     favicon32x32: "<link / abs url>"
    #     apple_touch_icon: "<link / abs url>"
    #     safari_pinned_tab: "<link / abs url>"

    # cover:
    #     hidden: true # hide everywhere but not in structured data
    #     hiddenInList: true # hide on list pages and home
    #     hiddenInSingle: true # hide on single page

    # fuseOpts:
    #     isCaseSensitive: false
    #     shouldSort: true
    #     location: 0
    #     distance: 1000
    #     threshold: 0.4
    #     minMatchCharLength: 0
    #     keys: ["title", "permalink", "summary", "content"]

taxonomies:
    category: categories
    tag: tags
    series: series

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        # anchorLineNos: true
        codeFences: true
        guessSyntax: true
        lineNos: true
        # noClasses: false
        style: monokai

privacy:
    vimeo:
        disabled: false
        simple: true

    x:
        disabled: false
        enableDNT: true
        simple: true

    instagram:
        disabled: false
        simple: true

    youtube:
        disabled: false
        privacyEnhanced: true

services:
    instagram:
        disableInlineCSS: true
    x:
        disableInlineCSS: true
